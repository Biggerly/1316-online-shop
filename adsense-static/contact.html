<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Contact — Naija Insights</title>
<meta name="description" content="Contact Naija Insights for feedback, corrections, or partnerships."/>
<link rel="icon" href="/assets/img/favicon.svg"/>
<link rel="stylesheet" href="/assets/css/styles.css"/>
<script defer src="/assets/js/main.js"></script>
</head>
<body>
<header class="header"><div class="container nav">
  <a class="brand" href="/"><img src="/assets/img/favicon.svg" width="24" height="24" alt="Naija Insights"/> <span>Naija Insights</span></a>
  <nav class="links"><a href="/">Home</a><a href="/articles">Articles</a><a href="/about.html">About</a><a href="/contact.html">Contact</a></nav>
  <button id="menuBtn" class="menu-btn" aria-label="Open menu">≡</button>
</div><div id="mobileMenu" class="container mobile-menu">
  <a href="/">Home</a><a href="/articles">Articles</a><a href="/about.html">About</a><a href="/contact.html">Contact</a>
</div></header>
<main class="container">
  <h1 class="h1">Contact</h1>
  <p class="p">Use the form below to reach us. We reply within 2 business days.</p>
  <form class="card"><div class="card-body">
    <label class="text-xs" for="name">Name</label>
    <input id="name" class="input" type="text" placeholder="Your name" required />
    <label class="text-xs" for="email">Email</label>
    <input id="email" class="input" type="email" placeholder="you@example.com" required />
    <label class="text-xs" for="msg">Message</label>
    <textarea id="msg" class="input" rows="5" placeholder="How can we help?"></textarea>
    <div style="margin-top:.75rem"><button class="btn btn-primary" type="submit">Send</button></div>
  </div></form>
</main>
<footer class="footer"><div class="container"><p class="text-xs">© <span id="year"></span> Naija Insights.</p></div></footer>
<div id="cookieBar" class="cookie"><div class="wrap"><p class="text-xs">We use cookies to improve your experience.</p><div class="actions"><button id="cookieAccept" class="btn btn-primary">Accept</button></div></div></div>
</body></html>
